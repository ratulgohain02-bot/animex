<!DOCTYPE html>

}

header {
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:linear-gradient(to right,#111,#000);
}

  height:200px;

.row {

.scroll {

}

.card {

  margin-right:10px;
}

.card img {

  border-radius:10px;

button {

  border:none;
  color:white;

</head>

</html>
