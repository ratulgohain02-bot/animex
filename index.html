<!DOCTYPE html>
<html>
<head>
<title>AnimeX</title>

<style>
body {
  margin:0;
  background:#000;
  font-family:Arial;
  color:white;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#111;
}

.logo {
  font-size:22px;
  font-weight:bold;
}

.logo span {
  color:red;
}

.search {
  padding:8px;
  border-radius:5px;
  border:none;
}

/* HERO */
.hero {
  height:200px;
  background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') center/cover;
  display:flex;
  align-items:end;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

/* GRID */
.container {
  padding:20px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}

.card {
  background:#111;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card h3 {
  padding:10px;
  font-size:14px;
}
</style>

</head>

<body>

<div class="navbar">
  <div class="logo">Anime<span>X</span></div>
  <input class="search" id="search" placeholder="Search anime..." onkeyup="searchAnime()">
</div>

<div class="hero">
  Watch Anime Now
</div>

<div class="container">
  <h2>Anime List</h2>
  <div class="grid" id="animeList"></div>
</div>

<script>

let allAnime = JSON.parse(localStorage.getItem("animeList")) || [];

function showAnime(data) {
  let container = document.getElementById("animeList");
  container.innerHTML = "";

  data.forEach(a => {
    container.innerHTML += `
      <div class="card">
        <img src="${a.image}">
        <h3>${a.title}</h3>
      </div>
    `;
  });
}

/* SEARCH */
function searchAnime() {
  let value = document.getElementById("search").value.toLowerCase();

  let filtered = allAnime.filter(a =>
    a.title.toLowerCase().includes(value)
  );

  showAnime(filtered);
}

showAnime(allAnime);

</script>

</body>
</html>
