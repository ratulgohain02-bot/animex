<!DOCTYPE html>
<html>
<head>
<title>AnimeX</title>
<style>
body {background:#0f172a;color:white;font-family:sans-serif;margin:0;}
header {padding:15px;font-size:22px;font-weight:bold;background:#020617;}
.container {padding:20px;}
.card {background:#1e293b;padding:15px;margin:10px;border-radius:10px;}
img {width:100%;border-radius:10px;}
button {background:#6366f1;color:white;border:none;padding:10px;border-radius:5px;}
</style>
</head>

<body>

<header>🔥 AnimeX</header>

<div class="container">

<h2>Popular Anime</h2>

<div class="card">
<img src="https://picsum.photos/400/200">
<h3>Naruto</h3>
<button onclick="watch('Naruto')">Watch</button>
</div>

<div class="card">
<img src="https://picsum.photos/400/201">
<h3>One Piece</h3>
<button onclick="watch('One Piece')">Watch</button>
</div>

</div>

<script>
function watch(name){
  alert("Playing " + name);
}
</script>

</body>
</html>
