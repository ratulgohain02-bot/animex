    <!DOCTYPE html>
<html>
<head>
<title>AnimeX</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#141414;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 20px;
  position:fixed;
  width:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.9),transparent);
  z-index:10;
}

/* LOGO */
.logo img {
  height:40px;
}

/* SEARCH */
.search {
  padding:6px;
  border-radius:5px;
  border:none;
  outline:none;
}

/* HERO */
.hero {
  height:350px;
  background:url("https://wallpaperaccess.com/full/854134.jpg") center/cover;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:20px;
}

/* ROW */
.row {
  padding:15px;
}

.scroll {
  display:flex;
  overflow-x:auto;
}

/* CARD */
.card {
  min-width:150px;
  margin-right:10px;
  transition:0.3s;
}

.card img {
  width:100%;
  border-radius:8px;
}

/* HOVER */
.card:hover {
  transform:scale(1.15);
}

/* TITLE */
.title {
  font-size:14px;
  margin-top:5px;
}
</style>

</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png">
  </div>

  <input class="search" id="search" placeholder="Search anime..." onkeyup="searchAnime()">
</header>

<div class="hero">
  <h1>Watch Anime Now</h1>
</div>

<div class="row">
  <h2>Anime Series</h2>

  <div class="scroll" id="animeList">

    <div class="card">
      <img src="https://wallpaperaccess.com/full/854129.jpg">
      <div class="title">Naruto</div>
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/854134.jpg">
      <div class="title">Death Note</div>
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/854129.jpg">
      <div class="title">Attack on Titan</div>
    </div>

    <div class="card">
      <img src="https://wallpaperaccess.com/full/854134.jpg">
      <div class="title">One Piece</div>
    </div>

  </div>
</div>

<script>
function searchAnime() {
  let input = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card => {
    let title = card.innerText.toLowerCase();
    if (title.includes(input)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
}
</script>

</body>
</html>
