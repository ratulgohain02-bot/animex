<h2>Add Episode</h2>

<select id="animeSelect"></select>

<input type="text" id="episodeTitle" placeholder="Episode Title">
<input type="text" id="videoUrl" placeholder="Video URL (YouTube / MP4 link)">

<button onclick="addEpisode()">Add Episode</button>

<script>
let animeData = JSON.parse(localStorage.getItem("animeData")) || [];
let episodeData = JSON.parse(localStorage.getItem("episodeData")) || [];

// load anime list
const select = document.getElementById("animeSelect");
animeData.forEach((anime, index) => {
  let opt = document.createElement("option");
  opt.value = index;
  opt.text = anime.title;
  select.appendChild(opt);
});

function addEpisode() {
  const animeIndex = select.value;
  const title = document.getElementById("episodeTitle").value;
  const video = document.getElementById("videoUrl").value;

  episodeData.push({
    animeIndex,
    title,
    video
  });

  localStorage.setItem("episodeData", JSON.stringify(episodeData));

  alert("Episode added 🔥");
}
</script>
